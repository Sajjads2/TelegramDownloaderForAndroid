name: Build TDLib Native + APK (No Repo Changes)

on:
  push:
    branches: [ main ]

jobs:

  build-tdlib:
    runs-on: ubuntu-latest

    steps:
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y git cmake g++ clang libssl-dev zlib1g-dev
          gperf

      - name: Clone TDLib
        run: git clone https://github.com/tdlib/td.git

      - name: Build TDLib
        run: |
          cd td
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --parallel 4

      - name: Extract libtdjni.so
        run: |
          mkdir -p out
          find td -name "libtdjni.so" -exec cp {} out/ \;

      - name: Upload native libs
        uses: actions/upload-artifact@v4
        with:
          name: tdlib-native
          path: out/

  build-apk:
    needs: build-tdlib
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download native libs
        uses: actions/download-artifact@v4
        with:
          name: tdlib-native
          path: temp-lib/

      - name: Inject into project (NO repo change)
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp temp-lib/libtdjni.so app/src/main/jniLibs/arm64-v8a/

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/build/outputs/apk/debug/app-debug.apk
